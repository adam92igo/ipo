services:
  db:
    image: postgres:17-alpine
    container_name: ipo-compass-db
    environment:
      POSTGRES_USER: ipo
      POSTGRES_PASSWORD: ipo_dev_password
      POSTGRES_DB: ipo_compass
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./scripts/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ipo -d ipo_compass"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  db_data:
